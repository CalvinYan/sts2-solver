repos:
-  repo: https://github.com/psf/black-pre-commit-mirror
   rev: 26.5.1
   hooks:
   -  id: black
      args:
      -  --line-length=120
-  repo: https://github.com/pre-commit/mirrors-mypy
   rev: v2.1.0
   hooks:
   -  id: mypy
-  repo: https://github.com/astral-sh/ruff-pre-commit
   rev: v0.15.2
   hooks:
   - id: ruff-check
     args:
     - --select=I,F,N,RUF,PERF
     - --fix
     - --exit-non-zero-on-fix